name: Build release packages

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (X.Y.Z)
        required: true
        default: 0.1.0
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  windows-runtime:
    runs-on: windows-2022
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up the native MSYS2 UCRT64 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-make
            mingw-w64-ucrt-x86_64-pkgconf
            mingw-w64-ucrt-x86_64-libusb
            mingw-w64-ucrt-x86_64-hidapi

      - name: Build the native Windows runtime
        shell: msys2 {0}
        run: |
          set -euo pipefail
          make PLATFORM=windows clean
          make -j"$(nproc)" PLATFORM=windows CC=gcc all
          objdump -p ryujin-doom.exe | grep -F 'DLL Name: libhidapi-0.dll'
          mkdir -p windows-runtime
          cp ryujin-doom.exe windows-runtime/
          cp /ucrt64/bin/libusb-1.0.dll windows-runtime/
          cp /ucrt64/bin/libhidapi-0.dll windows-runtime/

      - name: Upload native Windows runtime
        uses: actions/upload-artifact@v4
        with:
          name: windows-runtime
          path: windows-runtime/
          if-no-files-found: error

  release:
    needs: windows-runtime
    runs-on: ubuntu-22.04
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Linux release toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libusb-1.0-0-dev git curl patch \
            zip unzip dpkg-dev rpm nsis

      - name: Download native Windows runtime
        uses: actions/download-artifact@v4
        with:
          name: windows-runtime
          path: windows-runtime

      - name: Select release inputs
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == workflow_dispatch ]]; then
            echo "VERSION=${{ inputs.version }}" >> "${GITHUB_ENV}"
          elif [[ "${GITHUB_REF_TYPE}" == tag ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "${GITHUB_ENV}"
          else
            echo "VERSION=$(<VERSION)" >> "${GITHUB_ENV}"
          fi

      - name: Audit release tree
        run: ./scripts/check-release-tree.sh

      - name: Build DEB, RPM, Windows setup, and portable archives
        run: WINDOWS_RUNTIME_DIR="$GITHUB_WORKSPACE/windows-runtime" ./scripts/build-release.sh

      - name: Verify packaged native HID runtime
        run: |
          unzip -l "dist/ryujin-doom-${VERSION}-windows-x86_64.zip" | \
            grep -F 'libhidapi-0.dll'

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ryujin-doom-${{ env.VERSION }}
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == tag ]]; then
            release_tag="${GITHUB_REF_NAME}"
          else
            release_tag="v${VERSION}"
          fi

          if gh release view "${release_tag}" >/dev/null 2>&1; then
            release_sha=$(gh api \
              "repos/${GITHUB_REPOSITORY}/commits/${release_tag}" \
              --jq .sha)
            if [[ "${release_sha}" != "${GITHUB_SHA}" ]]; then
              echo "::notice::${release_tag} already exists at ${release_sha}; bump VERSION to publish this commit"
              exit 0
            fi
          elif [[ "${GITHUB_REF_TYPE}" == tag ]]; then
            gh release create "${release_tag}" --verify-tag --generate-notes
          else
            gh release create "${release_tag}" \
              --target "${GITHUB_SHA}" \
              --title "Ryujin Doom ${VERSION}" \
              --generate-notes
          fi

          gh release upload "${release_tag}" dist/* --clobber
